          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PodAutoscalerSpec defines the desired state of PodAutoscaler.
            properties:
              dryRun:
                default: false
                description: |-
                  DryRun, when true, makes the controller calculate recommendations but never
                  mutate pods. Useful for auditing before enabling live updates.
                type: boolean
              evaluationWindowMinutes:
                default: 5
                description: 'EvaluationWindowMinutes controls the time window for
                  aggregating metrics. Minimum: 1.'
                format: int32
                minimum: 1
                type: integer
              metricsCollectionIntervalSeconds:
                default: 30
                description: |-
                  MetricsCollectionIntervalSeconds is how often (in seconds) the controller
                  reconciles and re-evaluates resource allocations. Minimum: 10.
                format: int32
                minimum: 10
                type: integer
              resourcePolicy:
                description: |-
                  ResourcePolicy provides per-container resource boundaries.
                  If omitted, Podfather uses built-in default constraints.
                properties:
                  containerPolicies:
                    description: |-
                      ContainerPolicies is a list of per-container resource policies.
                      Use containerName "*" to set defaults for all containers.
                    items:
                      description: ContainerResourcePolicy defines resource constraints
                        for a single container.
                      properties:
                        containerName:
                          description: ContainerName is the name of the container,
                            or "*" for all containers.
                          type: string
                        controlledResources:
                          description: |-
                            ControlledResources lists which resources (cpu, memory) Podfather manages.
                            If empty, both cpu and memory are managed.
                          items:
                            description: ResourceName is the name identifying various
                              resources in a ResourceList.
                            type: string
                          type: array
                        maxAllowed:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: MaxAllowed specifies the maximum resources
                            Podfather may recommend.
                          type: object
                        minAllowed:
                          additionalProperties:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          description: MinAllowed specifies the minimum resources
                            Podfather may recommend.
                          type: object
                      required:
                      - containerName
                      type: object
                    type: array
                type: object
              selector:
                description: |-
                  Selector identifies the set of pods managed by this PodAutoscaler.
                  Only pods matching this selector will be monitored and (optionally) resized.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              targetRef:
                description: |-
