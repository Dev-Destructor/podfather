                properties:
                  apiVersion:
                    description: API version of the referent (e.g. "apps/v1").
                    type: string
                  kind:
                    description: Kind of the referent (e.g. "Deployment", "StatefulSet").
                    type: string
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - kind
                - name
                type: object
              updatePolicy:
                description: UpdatePolicy controls how and whether resource changes
                  are applied to pods.
                properties:
                  maxUnavailable:
                    default: 1
                    description: |-
                      MaxUnavailable is the maximum number of pods that can be unavailable during
                      eviction-based updates. Only relevant for Recreate and Auto (fallback) modes.
                    format: int32
                    minimum: 0
                    type: integer
                  updateMode:
                    default: Auto
                    description: 'UpdateMode selects the update strategy. One of:
                      Auto (default), InPlace, Recreate, Off.'
                    enum:
                    - Auto
                    - InPlace
                    - Recreate
                    - "Off"
                    type: string
                type: object
              varianceThresholdPercent:
                default: 15
                description: |-
                  VarianceThresholdPercent is the minimum percentage difference between current
                  allocation and recommended allocation required to trigger an update.
                  This prevents excessive churn caused by small oscillations.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
            required:
            - selector
            type: object
