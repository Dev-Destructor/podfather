      displayName: Pod Autoscaler
      kind: PodAutoscaler
      name: podautoscalers.autoscaling.podfather.io
      version: v1alpha1
  description: |
    ## Podfather — Autonomous Pod Resource Optimizer

    Podfather is a **Level 5 (Auto Pilot)** Kubernetes Operator that brings
    intelligent, metrics-driven vertical scaling to your workloads.

    ### Features
    | Capability | Description |
    |---|---|
    | **Metric-Driven Scaling** | Collects real-time CPU & memory usage from the Kubernetes Metrics API |
    | **In-Place Resize** | Leverages KEP-1287 in-place pod vertical scaling when supported |
    | **Safe Eviction Fallback** | Gracefully evicts and lets the workload controller recreate pods |
    | **Dry-Run Mode** | Audits recommendations without mutating any pods |
    | **Deep Observability** | Exposes Prometheus metrics, alerting rules, and a Grafana dashboard |
    | **Auto-Healing** | Detects anomalous spikes and heals starved pods autonomously |

    ### How It Works
    1. A `PodAutoscaler` CR selects a set of pods via label selector.
    2. The controller periodically collects resource-usage metrics.
    3. A pluggable calculator computes ideal requests/limits considering
       average use, peak use, min/max constraints, and a configurable
       variance threshold.
    4. If the variance exceeds the threshold, pods are updated via the
       chosen strategy (Auto → InPlace → Recreate → Off).

    ### Getting Started
    ```yaml
    apiVersion: autoscaling.podfather.io/v1alpha1
    kind: PodAutoscaler
    metadata:
      name: my-app
    spec:
      selector:
        matchLabels:
          app: my-app
      updatePolicy:
        updateMode: Auto
      varianceThresholdPercent: 15
    ```

    ### Prerequisites
    - Kubernetes 1.28+ (1.31+ for in-place resize)
    - Metrics Server installed
    - OLM (for bundle installation) or Helm/Kustomize
