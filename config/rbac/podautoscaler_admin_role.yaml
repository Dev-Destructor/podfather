# This rule is not used by the project podfather itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over autoscaling.podfather.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: podfather
    app.kubernetes.io/managed-by: kustomize
  name: podautoscaler-admin-role
rules:
- apiGroups:
  - autoscaling.podfather.io
  resources:
  - podautoscalers
  verbs:
  - '*'
- apiGroups:
  - autoscaling.podfather.io
  resources:
  - podautoscalers/status
  verbs:
  - get
