apiVersion: autoscaling.podfather.io/v1alpha1
kind: PodAutoscaler
metadata:
  labels:
    app.kubernetes.io/name: podfather
    app.kubernetes.io/managed-by: kustomize
  name: podautoscaler-sample
spec:
  selector:
    matchLabels:
      app: my-app
  targetRef:
    kind: Deployment
    name: my-app
    apiVersion: apps/v1
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: "50m"
          memory: "64Mi"
        maxAllowed:
          cpu: "4"
          memory: "8Gi"
        controlledResources:
          - cpu
          - memory
  updatePolicy:
    updateMode: Auto
    maxUnavailable: 1
  metricsCollectionIntervalSeconds: 30
  evaluationWindowMinutes: 5
  varianceThresholdPercent: 15
  dryRun: false
  # Remediation strategy for multi-replica workloads:
  #   MaxPod  - uses the busiest replica's metrics (conservative)
  #   MinPod  - uses the quietest replica's metrics (aggressive)
  #   Auto    - uses P90 across all replicas (balanced, default)
  remediationStrategy: Auto
  # StatefulSet-specific update policy:
  #   PerPodInPlace - in-place resize each pod individually (no rolling restart, default)
  #   Template      - patch the STS PodTemplate (triggers rolling update)
  # statefulSetPolicy:
  #   updateMode: PerPodInPlace
  # VPA integration: when enabled, Podfather uses VPA recommendations
  # instead of its own algorithm (requires VPA to be in "Off" mode).
  # vpaPolicy:
  #   enabled: true
  #   strictMode: false
  #   # vpaName: ""  # optional: specify exact VPA name, otherwise auto-discovered via targetRef
